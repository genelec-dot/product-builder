<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 | Product Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 40px 20px;
        }
        .error-code { font-size: 6rem; font-weight: bold; color: #ffd700; }
        h1 { font-size: 1.5rem; margin: 16px 0 12px; }
        p { color: rgba(255,255,255,0.6); margin-bottom: 32px; max-width: 400px; line-height: 1.6; }
        a {
            display: inline-block; padding: 14px 36px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2e; font-weight: bold; font-size: 1.1rem;
            text-decoration: none; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            transition: transform 0.2s;
        }
        a:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 존재하지 않거나 이동되었을 수 있습니다. 아래 버튼을 눌러 메인 페이지로 이동하세요.</p>
    <a href="index.html">메인으로 돌아가기</a>
</body>
</html>
