<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            --text: #fff;
            --row-bg: rgba(255, 255, 255, 0.08);
            --row-bg-history: rgba(255, 255, 255, 0.05);
            --group-bg: rgba(255, 255, 255, 0.04);
            --time-color: rgba(255, 255, 255, 0.5);
            --toggle-bg: rgba(255, 255, 255, 0.12);
            --toggle-hover: rgba(255, 255, 255, 0.2);
        }

        [data-theme="light"] {
            --bg: linear-gradient(135deg, #e8eaf6, #f5f5f5, #e3f2fd);
            --text: #222;
            --row-bg: rgba(0, 0, 0, 0.06);
            --row-bg-history: rgba(0, 0, 0, 0.04);
            --group-bg: rgba(0, 0, 0, 0.03);
            --time-color: rgba(0, 0, 0, 0.45);
            --toggle-bg: rgba(0, 0, 0, 0.08);
            --toggle-hover: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: var(--text);
            transition: background 0.4s, color 0.3s;
        }

        /* 테마 토글 버튼 */
        .top-bar {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }

        #theme-btn {
            padding: 8px 18px;
            font-size: 1rem;
            background: var(--toggle-bg);
            color: var(--text);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #theme-btn:hover {
            background: var(--toggle-hover);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #generate-btn {
            padding: 16px 48px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1a1a2e;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        #generate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.6);
        }

        #generate-btn:active {
            transform: scale(0.97);
        }

        #results {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 700px;
        }

        .lotto-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--row-bg);
            border-radius: 16px;
            padding: 14px 18px;
            animation: fadeIn 0.4s ease;
            flex-wrap: wrap;
            transition: background 0.3s;
        }

        .row-label {
            font-weight: bold;
            font-size: 0.9rem;
            color: #ffd700;
            min-width: 24px;
        }

        .ball {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.05rem;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 -3px 6px rgba(0, 0, 0, 0.2), 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .ball-1  { background: #fbc400; color: #1a1a2e; }
        .ball-10 { background: #69c8f2; }
        .ball-20 { background: #ff7272; }
        .ball-30 { background: #aaa; }
        .ball-40 { background: #b0d840; color: #1a1a2e; }

        /* 기록 영역 */
        #history-section {
            margin-top: 3rem;
            width: 100%;
            max-width: 700px;
        }

        #history-section h2 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: #ffd700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #clear-btn {
            padding: 6px 16px;
            font-size: 0.85rem;
            color: #ff7272;
            background: transparent;
            border: 1px solid #ff7272;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #clear-btn:hover {
            background: rgba(255, 114, 114, 0.15);
        }

        .history-group {
            margin-bottom: 20px;
            background: var(--group-bg);
            border-radius: 16px;
            padding: 16px;
            animation: fadeIn 0.4s ease;
            transition: background 0.3s;
        }

        .history-time {
            font-size: 0.8rem;
            color: var(--time-color);
            margin-bottom: 10px;
            transition: color 0.3s;
        }

        .history-group .lotto-row {
            background: var(--row-bg-history);
            padding: 10px 14px;
            animation: none;
        }

        .history-group .ball {
            width: 36px;
            height: 36px;
            font-size: 0.9rem;
        }

        /* 제휴 문의 폼 */
        #contact-section {
            margin-top: 3rem;
            width: 100%;
            max-width: 700px;
        }

        #contact-section h2 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: #ffd700;
        }

        #contact-form {
            background: var(--group-bg);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: background 0.3s;
        }

        #contact-form label {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text);
        }

        #contact-form input,
        #contact-form textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            background: var(--row-bg);
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
        }

        #contact-form input:focus,
        #contact-form textarea:focus {
            border-color: #ffd700;
        }

        #contact-form textarea {
            min-height: 100px;
            resize: vertical;
        }

        #contact-form button[type="submit"] {
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #1a1a2e;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        #contact-form button[type="submit"]:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.6);
        }

        #contact-form button[type="submit"]:active {
            transform: scale(0.97);
        }

        #form-status {
            text-align: center;
            font-size: 0.95rem;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }

        #form-status.success {
            display: block;
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }

        #form-status.error {
            display: block;
            background: rgba(255, 114, 114, 0.15);
            color: #ff7272;
        }

        /* 댓글 영역 */
        #comment-section {
            margin-top: 3rem;
            width: 100%;
            max-width: 700px;
        }

        #comment-section h2 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: #ffd700;
        }

        #disqus_thread {
            background: var(--group-bg);
            border-radius: 16px;
            padding: 24px;
            transition: background 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button id="theme-btn">☀️ 라이트 모드</button>
    </div>
    <h1>🎱 로또 번호 추천기</h1>
    <button id="generate-btn">번호 생성하기</button>
    <div id="results"></div>

    <div id="history-section" style="display:none;">
        <h2>
            <span>📋 추천 기록</span>
            <button id="clear-btn">기록 삭제</button>
        </h2>
        <div id="history-list"></div>
    </div>

    <section id="contact-section">
        <h2>📩 제휴 문의</h2>
        <form id="contact-form" action="https://formspree.io/f/mbdavpbz" method="POST">
            <label for="name">이름 / 회사명</label>
            <input type="text" id="name" name="name" placeholder="홍길동 / ABC 주식회사" required>

            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required>

            <label for="message">문의 내용</label>
            <textarea id="message" name="message" placeholder="제휴 관련 문의 내용을 입력해주세요." required></textarea>

            <button type="submit">문의 보내기</button>
            <div id="form-status"></div>
        </form>
    </section>

    <section id="comment-section">
        <h2>💬 댓글</h2>
        <div id="disqus_thread"></div>
    </section>

    <script>
        var disqus_config = function () {
            this.page.url = 'https://genelec-dot.github.io/product-builder/';
            this.page.identifier = 'lotto-generator';
        };
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://productbuilder-3ojzs5kkfu.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>

    <script>
        const history = JSON.parse(localStorage.getItem('lottoHistory') || '[]');

        // 테마 관리
        const themeBtn = document.getElementById('theme-btn');
        const savedTheme = localStorage.getItem('lottoTheme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeBtn(savedTheme);

        themeBtn.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('lottoTheme', next);
            updateThemeBtn(next);
        });

        function updateThemeBtn(theme) {
            themeBtn.textContent = theme === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
        }

        function getRandomLottoNumbers() {
            const numbers = [];
            while (numbers.length < 6) {
                const n = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(n)) numbers.push(n);
            }
            return numbers.sort((a, b) => a - b);
        }

        function getBallClass(num) {
            if (num <= 10) return 'ball-1';
            if (num <= 20) return 'ball-10';
            if (num <= 30) return 'ball-20';
            if (num <= 40) return 'ball-30';
            return 'ball-40';
        }

        function createBall(num) {
            const ball = document.createElement('div');
            ball.className = `ball ${getBallClass(num)}`;
            ball.textContent = num;
            return ball;
        }

        function createLottoRow(label, numbers) {
            const row = document.createElement('div');
            row.className = 'lotto-row';

            const labelEl = document.createElement('span');
            labelEl.className = 'row-label';
            labelEl.textContent = label;
            row.appendChild(labelEl);

            numbers.forEach(num => row.appendChild(createBall(num)));

            return row;
        }

        function renderHistory() {
            const section = document.getElementById('history-section');
            const list = document.getElementById('history-list');
            list.innerHTML = '';

            if (history.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';

            history.forEach(entry => {
                const group = document.createElement('div');
                group.className = 'history-group';

                const time = document.createElement('div');
                time.className = 'history-time';
                time.textContent = entry.time;
                group.appendChild(time);

                entry.sets.forEach((nums, i) => {
                    group.appendChild(createLottoRow(String.fromCharCode(65 + i), nums));
                });

                list.appendChild(group);
            });
        }

        function saveHistory() {
            localStorage.setItem('lottoHistory', JSON.stringify(history));
        }

        document.getElementById('generate-btn').addEventListener('click', () => {
            const results = document.getElementById('results');
            results.innerHTML = '';

            const sets = [];
            for (let i = 0; i < 5; i++) {
                const nums = getRandomLottoNumbers();
                sets.push(nums);

                const row = createLottoRow(String.fromCharCode(65 + i), nums);
                row.style.animationDelay = `${i * 0.1}s`;
                results.appendChild(row);
            }

            const now = new Date();
            const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

            history.unshift({ time: timeStr, sets });
            if (history.length > 20) history.pop();
            saveHistory();
            renderHistory();
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            history.length = 0;
            saveHistory();
            renderHistory();
        });

        renderHistory();

        // 제휴 문의 폼
        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const status = document.getElementById('form-status');
            const submitBtn = form.querySelector('button[type="submit"]');

            submitBtn.disabled = true;
            submitBtn.textContent = '전송 중...';
            status.className = '';
            status.style.display = 'none';

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (res.ok) {
                    status.textContent = '문의가 성공적으로 전송되었습니다!';
                    status.className = 'success';
                    form.reset();
                } else {
                    status.textContent = '전송에 실패했습니다. 다시 시도해주세요.';
                    status.className = 'error';
                }
            } catch {
                status.textContent = '네트워크 오류가 발생했습니다.';
                status.className = 'error';
            }

            submitBtn.disabled = false;
            submitBtn.textContent = '문의 보내기';
        });
    </script>
</body>
</html>
