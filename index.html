<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #generate-btn {
            padding: 16px 48px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1a1a2e;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        #generate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.6);
        }

        #generate-btn:active {
            transform: scale(0.97);
        }

        #results {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 700px;
        }

        .lotto-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 14px 18px;
            animation: fadeIn 0.4s ease;
            flex-wrap: wrap;
        }

        .row-label {
            font-weight: bold;
            font-size: 0.9rem;
            color: #ffd700;
            min-width: 24px;
        }

        .ball {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.05rem;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
            box-shadow: inset 0 -3px 6px rgba(0, 0, 0, 0.2), 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .separator {
            font-size: 1.4rem;
            color: #ffd700;
            margin: 0 2px;
        }

        .bonus .ball {
            border: 2px dashed #ffd700;
        }

        .ball-1  { background: #fbc400; color: #1a1a2e; }
        .ball-10 { background: #69c8f2; }
        .ball-20 { background: #ff7272; }
        .ball-30 { background: #aaa; }
        .ball-40 { background: #b0d840; color: #1a1a2e; }

        /* 기록 영역 */
        #history-section {
            margin-top: 3rem;
            width: 100%;
            max-width: 700px;
        }

        #history-section h2 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: #ffd700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #clear-btn {
            padding: 6px 16px;
            font-size: 0.85rem;
            color: #ff7272;
            background: transparent;
            border: 1px solid #ff7272;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #clear-btn:hover {
            background: rgba(255, 114, 114, 0.15);
        }

        .history-group {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 16px;
            animation: fadeIn 0.4s ease;
        }

        .history-time {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
        }

        .history-group .lotto-row {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            animation: none;
        }

        .history-group .ball {
            width: 36px;
            height: 36px;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <h1>🎱 로또 번호 추천기</h1>
    <button id="generate-btn">번호 생성하기</button>
    <div id="results"></div>

    <div id="history-section" style="display:none;">
        <h2>
            <span>📋 추천 기록</span>
            <button id="clear-btn">기록 삭제</button>
        </h2>
        <div id="history-list"></div>
    </div>

    <script>
        const history = JSON.parse(localStorage.getItem('lottoHistory') || '[]');

        function getRandomLottoSet() {
            const numbers = [];
            while (numbers.length < 7) {
                const n = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(n)) numbers.push(n);
            }
            const main = numbers.slice(0, 6).sort((a, b) => a - b);
            const bonus = numbers[6];
            return { main, bonus };
        }

        function getBallClass(num) {
            if (num <= 10) return 'ball-1';
            if (num <= 20) return 'ball-10';
            if (num <= 30) return 'ball-20';
            if (num <= 40) return 'ball-30';
            return 'ball-40';
        }

        function createBall(num) {
            const ball = document.createElement('div');
            ball.className = `ball ${getBallClass(num)}`;
            ball.textContent = num;
            return ball;
        }

        function createLottoRow(label, set) {
            const row = document.createElement('div');
            row.className = 'lotto-row';

            const labelEl = document.createElement('span');
            labelEl.className = 'row-label';
            labelEl.textContent = label;
            row.appendChild(labelEl);

            set.main.forEach(num => row.appendChild(createBall(num)));

            const sep = document.createElement('span');
            sep.className = 'separator';
            sep.textContent = '+';
            row.appendChild(sep);

            const bonusWrap = document.createElement('span');
            bonusWrap.className = 'bonus';
            bonusWrap.appendChild(createBall(set.bonus));
            row.appendChild(bonusWrap);

            return row;
        }

        function renderHistory() {
            const section = document.getElementById('history-section');
            const list = document.getElementById('history-list');
            list.innerHTML = '';

            if (history.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';

            history.forEach(entry => {
                const group = document.createElement('div');
                group.className = 'history-group';

                const time = document.createElement('div');
                time.className = 'history-time';
                time.textContent = entry.time;
                group.appendChild(time);

                entry.sets.forEach((set, i) => {
                    group.appendChild(createLottoRow(String.fromCharCode(65 + i), set));
                });

                list.appendChild(group);
            });
        }

        function saveHistory() {
            localStorage.setItem('lottoHistory', JSON.stringify(history));
        }

        document.getElementById('generate-btn').addEventListener('click', () => {
            const results = document.getElementById('results');
            results.innerHTML = '';

            const sets = [];
            for (let i = 0; i < 5; i++) {
                const set = getRandomLottoSet();
                sets.push(set);

                const row = createLottoRow(String.fromCharCode(65 + i), set);
                row.style.animationDelay = `${i * 0.1}s`;
                results.appendChild(row);
            }

            const now = new Date();
            const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

            history.unshift({ time: timeStr, sets });
            if (history.length > 20) history.pop();
            saveHistory();
            renderHistory();
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            history.length = 0;
            saveHistory();
            renderHistory();
        });

        renderHistory();
    </script>
</body>
</html>
