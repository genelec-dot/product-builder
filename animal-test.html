<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            --text: #fff;
            --card-bg: rgba(255, 255, 255, 0.08);
            --group-bg: rgba(255, 255, 255, 0.04);
            --toggle-bg: rgba(255, 255, 255, 0.12);
            --toggle-hover: rgba(255, 255, 255, 0.2);
        }

        [data-theme="light"] {
            --bg: linear-gradient(135deg, #e8eaf6, #f5f5f5, #e3f2fd);
            --text: #222;
            --card-bg: rgba(0, 0, 0, 0.06);
            --group-bg: rgba(0, 0, 0, 0.03);
            --toggle-bg: rgba(0, 0, 0, 0.08);
            --toggle-hover: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: var(--text);
            transition: background 0.4s, color 0.3s;
        }

        .top-bar {
            width: 100%;
            max-width: 700px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .back-link {
            color: #ffd700;
            text-decoration: none;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .back-link:hover { opacity: 0.7; }

        #theme-btn {
            padding: 8px 18px;
            font-size: 1rem;
            background: var(--toggle-bg);
            color: var(--text);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #theme-btn:hover { background: var(--toggle-hover); }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.6;
            margin-bottom: 2rem;
        }

        /* 메인 카드 */
        .test-card {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: background 0.3s;
        }

        /* 웹캠 */
        #webcam-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid rgba(255, 215, 0, 0.4);
            display: none;
            position: relative;
        }

        #webcam-container canvas {
            width: 280px !important;
            height: 280px !important;
            object-fit: cover;
        }

        /* 이미지 업로드 */
        #upload-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid rgba(255, 215, 0, 0.4);
            display: none;
            position: relative;
        }

        #upload-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 시작 전 플레이스홀더 */
        .placeholder {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 4px dashed rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }

        /* 버튼들 */
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #1a1a2e;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.6);
        }

        .btn:active { transform: scale(0.97); }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--toggle-bg);
            color: var(--text);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: var(--toggle-hover);
            box-shadow: none;
        }

        #file-input { display: none; }

        /* 결과 영역 */
        #result-section {
            display: none;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .result-animal {
            font-size: 4rem;
            margin-bottom: 8px;
        }

        .result-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 6px;
        }

        .result-percent {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 16px;
        }

        .result-desc {
            font-size: 0.95rem;
            line-height: 1.7;
            opacity: 0.75;
            max-width: 400px;
            margin: 0 auto;
        }

        /* 확률 바 */
        .bar-group {
            width: 100%;
            max-width: 400px;
            margin: 16px auto 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-label {
            min-width: 50px;
            font-size: 0.9rem;
            text-align: right;
        }

        .bar-track {
            flex: 1;
            height: 24px;
            background: var(--group-bg);
            border-radius: 12px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 0.8s ease;
        }

        .bar-fill.dog { background: linear-gradient(90deg, #ffd700, #ffaa00); }
        .bar-fill.cat { background: linear-gradient(90deg, #69c8f2, #4a9fd8); }

        .bar-value {
            min-width: 48px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .loading {
            font-size: 1rem;
            opacity: 0.6;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-link">← 로또 추천기</a>
        <button id="theme-btn">☀️ 라이트 모드</button>
    </div>

    <h1>🐾 동물상 테스트</h1>
    <p class="subtitle">카메라 또는 사진으로 나의 동물상을 알아보세요!</p>

    <div class="test-card">
        <div class="placeholder" id="placeholder">🐶</div>
        <div id="webcam-container"></div>
        <div id="upload-container"><img id="upload-preview" alt="uploaded"></div>

        <div class="btn-group">
            <button class="btn" id="webcam-btn" onclick="startWebcam()">📷 카메라로 테스트</button>
            <button class="btn btn-secondary" id="upload-btn" onclick="document.getElementById('file-input').click()">🖼️ 사진 올리기</button>
            <input type="file" id="file-input" accept="image/*" onchange="handleUpload(event)">
        </div>

        <button class="btn" id="capture-btn" style="display:none" onclick="capture()">찰칵! 분석하기</button>
        <div class="loading" id="loading">분석 중...</div>

        <div id="result-section">
            <div class="result-animal" id="result-emoji"></div>
            <div class="result-title" id="result-title"></div>
            <div class="result-percent" id="result-percent"></div>
            <div class="result-desc" id="result-desc"></div>
            <div class="bar-group" id="bar-group"></div>
        </div>

        <button class="btn btn-secondary" id="retry-btn" style="display:none" onclick="retry()">다시 테스트하기</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/RZmM3hZV_/";
        let model, webcam, isWebcamMode = false;

        const animalData = {
            '강아지': {
                emoji: '🐶',
                title: '강아지상',
                desc: '밝고 활발한 에너지의 소유자! 사람을 좋아하고 친화력이 넘치며, 함께 있으면 주변이 환해지는 매력을 가지고 있어요. 충성스럽고 따뜻한 마음의 소유자입니다.'
            },
            '고양이': {
                emoji: '🐱',
                title: '고양이상',
                desc: '도도하면서도 묘한 매력의 소유자! 독립적이고 세련된 분위기를 풍기며, 알수록 빠져드는 반전 매력이 있어요. 자기만의 세계가 확고한 매력적인 사람입니다.'
            }
        };

        // 기본 fallback (모델의 클래스명이 다를 경우)
        const defaultAnimal = {
            emoji: '🐾',
            title: '동물상',
            desc: '독특한 매력의 소유자!'
        };

        // 테마
        const themeBtn = document.getElementById('theme-btn');
        const savedTheme = localStorage.getItem('lottoTheme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeBtn(savedTheme);

        themeBtn.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('lottoTheme', next);
            updateThemeBtn(next);
        });

        function updateThemeBtn(theme) {
            themeBtn.textContent = theme === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
        }

        async function loadModel() {
            if (model) return;
            model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
        }

        async function startWebcam() {
            document.getElementById('webcam-btn').disabled = true;
            document.getElementById('upload-btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').textContent = '카메라 로딩 중...';

            try {
                await loadModel();
                const flip = true;
                webcam = new tmImage.Webcam(280, 280, flip);
                await webcam.setup();
                await webcam.play();

                document.getElementById('placeholder').style.display = 'none';
                const container = document.getElementById('webcam-container');
                container.style.display = 'block';
                container.appendChild(webcam.canvas);

                isWebcamMode = true;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('capture-btn').style.display = 'inline-block';
                document.getElementById('webcam-btn').style.display = 'none';

                requestAnimationFrame(updateWebcam);
            } catch (err) {
                document.getElementById('loading').textContent = '카메라 접근에 실패했습니다.';
                document.getElementById('webcam-btn').disabled = false;
                document.getElementById('upload-btn').style.display = 'inline-block';
            }
        }

        function updateWebcam() {
            if (!isWebcamMode) return;
            webcam.update();
            requestAnimationFrame(updateWebcam);
        }

        async function capture() {
            document.getElementById('capture-btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').textContent = '분석 중...';

            isWebcamMode = false;
            webcam.update();

            const predictions = await model.predict(webcam.canvas);
            webcam.stop();
            showResult(predictions);
        }

        async function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('webcam-btn').style.display = 'none';
            document.getElementById('upload-btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').textContent = '분석 중...';

            const img = document.getElementById('upload-preview');
            img.src = window.URL.createObjectURL(file);

            await new Promise(resolve => { img.onload = resolve; });

            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('upload-container').style.display = 'block';

            await loadModel();
            const predictions = await model.predict(img);
            showResult(predictions);

            e.target.value = '';
        }

        function showResult(predictions) {
            document.getElementById('loading').style.display = 'none';

            // 가장 높은 확률 찾기
            let best = predictions[0];
            for (const p of predictions) {
                if (p.probability > best.probability) best = p;
            }

            const name = best.className.trim();
            const data = animalData[name] || { ...defaultAnimal, title: name + '상' };
            const percent = Math.round(best.probability * 100);

            document.getElementById('result-emoji').textContent = data.emoji;
            document.getElementById('result-title').textContent = data.title;
            document.getElementById('result-percent').textContent = `일치율 ${percent}%`;
            document.getElementById('result-desc').textContent = data.desc;

            // 확률 바
            const barGroup = document.getElementById('bar-group');
            barGroup.innerHTML = '';
            for (const p of predictions) {
                const pct = Math.round(p.probability * 100);
                const pName = p.className.trim();
                const info = animalData[pName];
                const emoji = info ? info.emoji : '🐾';
                const barClass = pName === '강아지' ? 'dog' : 'cat';

                barGroup.innerHTML += `
                    <div class="bar-row">
                        <span class="bar-label">${emoji} ${pName}</span>
                        <div class="bar-track">
                            <div class="bar-fill ${barClass}" style="width: 0%"></div>
                        </div>
                        <span class="bar-value">${pct}%</span>
                    </div>`;
            }

            document.getElementById('result-section').style.display = 'block';
            document.getElementById('retry-btn').style.display = 'inline-block';

            // 바 애니메이션
            requestAnimationFrame(() => {
                const fills = barGroup.querySelectorAll('.bar-fill');
                predictions.forEach((p, i) => {
                    fills[i].style.width = Math.round(p.probability * 100) + '%';
                });
            });
        }

        function retry() {
            if (webcam) { webcam.stop(); webcam = null; }
            isWebcamMode = false;

            document.getElementById('placeholder').style.display = 'flex';
            document.getElementById('webcam-container').style.display = 'none';
            document.getElementById('webcam-container').innerHTML = '';
            document.getElementById('upload-container').style.display = 'none';
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('retry-btn').style.display = 'none';
            document.getElementById('capture-btn').style.display = 'none';
            document.getElementById('loading').style.display = 'none';

            document.getElementById('webcam-btn').style.display = 'inline-block';
            document.getElementById('webcam-btn').disabled = false;
            document.getElementById('upload-btn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
